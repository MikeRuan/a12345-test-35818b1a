<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Star Catcher!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0d1b4b 0%, #1a237e 50%, #4a148c 100%);
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    color: white;
    font-size: 2.2em;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(255,220,0,0.7);
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 1em;
    margin-bottom: 18px;
  }

  /* Theme selector */
  .theme-wrap {
    text-align: center;
    margin-bottom: 16px;
  }
  .theme-wrap label {
    color: white;
    font-weight: bold;
    margin-right: 8px;
  }
  #themeSelect {
    padding: 8px 14px;
    border-radius: 12px;
    border: none;
    font-size: 0.95em;
    font-family: inherit;
    cursor: pointer;
    background: white;
    font-weight: bold;
    color: #333;
    outline: none;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .stat-box {
    background: rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 10px 22px;
    color: white;
    font-weight: bold;
    font-size: 1em;
    text-align: center;
    min-width: 100px;
  }

  .stat-box span {
    display: block;
    font-size: 1.6em;
    font-weight: 900;
  }

  /* Game area */
  .game-wrap {
    position: relative;
    max-width: 520px;
    margin: 0 auto 20px auto;
    background: rgba(255,255,255,0.07);
    border-radius: 24px;
    border: 2px solid rgba(255,255,255,0.15);
    overflow: hidden;
    height: 380px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    cursor: crosshair;
  }

  /* The clickable target */
  #target {
    position: absolute;
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8em;
    cursor: pointer;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 3px solid rgba(255,255,255,0.3);
    transition: transform 0.1s;
    user-select: none;
    /* Glow effect */
    box-shadow: 0 0 18px rgba(255,220,0,0.5);
    animation: pulse 1.1s infinite alternate;
  }

  #target:hover { transform: scale(1.12); }

  @keyframes pulse {
    from { box-shadow: 0 0 12px rgba(255,220,0,0.4); }
    to   { box-shadow: 0 0 28px rgba(255,220,0,0.9); }
  }

  /* Pop animation when clicked */
  @keyframes pop {
    0%   { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.5); opacity: 0.6; }
    100% { transform: scale(0); opacity: 0; }
  }
  .popping { animation: pop 0.25s ease forwards; pointer-events: none; }

  /* Floating +1 text */
  .plus-one {
    position: absolute;
    color: #FFD700;
    font-weight: 900;
    font-size: 1.5em;
    pointer-events: none;
    animation: floatUp 0.8s ease forwards;
    text-shadow: 0 0 8px rgba(0,0,0,0.5);
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-60px); }
  }

  /* Twinkling background stars */
  .bg-star {
    position: absolute;
    color: rgba(255,255,255,0.25);
    font-size: 1em;
    pointer-events: none;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; }
    to   { opacity: 0.5; }
  }

  /* Win overlay */
  .win-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,40,0.92);
    border-radius: 22px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 30px;
  }
  .win-overlay.show { display: flex; }

  .win-emoji { font-size: 4em; margin-bottom: 10px; }
  .win-title {
    font-size: 2em;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 16px rgba(255,215,0,0.7);
    margin-bottom: 8px;
  }
  .win-msg {
    color: rgba(255,255,255,0.85);
    font-size: 1.05em;
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .win-stats {
    color: #b39ddb;
    font-weight: bold;
    font-size: 1em;
    margin-bottom: 24px;
  }

  /* Start overlay */
  .start-overlay {
    display: flex;
    position: absolute;
    inset: 0;
    background: rgba(10,10,40,0.88);
    border-radius: 22px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 60;
    text-align: center;
    padding: 30px;
  }
  .start-overlay.hidden { display: none; }

  .start-emoji { font-size: 4em; margin-bottom: 12px; }
  .start-title {
    font-size: 1.7em;
    font-weight: 900;
    color: #FFD700;
    margin-bottom: 10px;
  }
  .start-msg {
    color: rgba(255,255,255,0.8);
    font-size: 1em;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* Buttons */
  .btn {
    padding: 13px 36px;
    background: linear-gradient(135deg, #FFD700, #ff6f00);
    color: #1a237e;
    border: none;
    border-radius: 30px;
    font-size: 1.1em;
    font-weight: 900;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-2px); }

  /* Progress bar */
  .progress-wrap {
    max-width: 520px;
    margin: 0 auto 14px auto;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    height: 14px;
    overflow: hidden;
  }
  #progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #FFD700, #ff6f00);
    border-radius: 20px;
    transition: width 0.3s ease;
  }

  @media (max-width: 400px) {
    .game-wrap { height: 300px; }
    #target { width: 58px; height: 58px; font-size: 2.2em; }
    h1 { font-size: 1.6em; }
  }
</style>
</head>
<body>

<h1>⭐ Star Catcher!</h1>
<p class="subtitle">Click the target 20 times to win!</p>

<!-- Theme selector -->
<div class="theme-wrap">
  <label for="themeSelect">🎨 Theme:</label>
  <select id="themeSelect">
    <option value="stars">⭐ Catch Stars</option>
    <option value="monsters">👾 Tap Monsters</option>
    <option value="coins">🪙 Collect Coins</option>
    <option value="robots">🤖 Save Robots</option>
  </select>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-box">Score<span id="scoreDisplay">0</span></div>
  <div class="stat-box">Goal<span id="goalDisplay">20</span></div>
  <div class="stat-box">⏱ Time<span id="timerDisplay">0s</span></div>
</div>

<!-- Progress bar -->
<div class="progress-wrap">
  <div id="progressBar"></div>
</div>

<!-- Game area -->
<div class="game-wrap" id="gameWrap">

  <!-- Background decorations (added by JS) -->

  <!-- The target -->
  <div id="target">⭐</div>

  <!-- Start overlay -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-emoji" id="startEmoji">⭐</div>
    <div class="start-title" id="startTitle">Catch Stars!</div>
    <div class="start-msg" id="startMsg">Click the star as fast as you can!<br>Get <strong>20 points</strong> to win! 🏆</div>
    <button class="btn" id="startBtn">▶ Start Game</button>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-emoji" id="winEmoji">🏆</div>
    <div class="win-title">You Win! 🎉</div>
    <div class="win-msg" id="winMsg">Amazing clicking! You caught all 20 stars!</div>
    <div class="win-stats" id="winStats"></div>
    <button class="btn" id="winRestartBtn">🔄 Play Again</button>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ── Themes ──────────────────────────────────────────────────────
  var themes = {
    stars:    { icon: '⭐', title: 'Catch Stars!',    msg: 'Click the star as fast as you can!',    win: 'Amazing! You caught all 20 stars! ⭐',    bg: '✨', glow: 'rgba(255,220,0,0.7)'   },
    monsters: { icon: '👾', title: 'Tap Monsters!',   msg: 'Tap the monster before it escapes!',     win: 'You defeated all 20 monsters! 👾',         bg: '💀', glow: 'rgba(0,255,100,0.6)'  },
    coins:    { icon: '🪙', title: 'Collect Coins!',  msg: 'Grab the coin before it disappears!',    win: 'You collected all 20 coins! 🪙',            bg: '💎', glow: 'rgba(255,200,0,0.7)'  },
    robots:   { icon: '🤖', title: 'Save Robots!',    msg: 'Click the robot to rescue it!',          win: 'You saved all 20 robots! 🤖',               bg: '🔧', glow: 'rgba(0,200,255,0.6)'  }
  };

  var GOAL = 20;

  // ── Game state ───────────────────────────────────────────────────
  var score = 0;
  var timerInterval = null;
  var secondsElapsed = 0;
  var gameRunning = false;
  var currentTheme = 'stars';
  var moveTimeout = null;

  // ── DOM refs ─────────────────────────────────────────────────────
  var target        = document.getElementById('target');
  var scoreDisplay  = document.getElementById('scoreDisplay');
  var timerDisplay  = document.getElementById('timerDisplay');
  var progressBar   = document.getElementById('progressBar');
  var winOverlay    = document.getElementById('winOverlay');
  var winStats      = document.getElementById('winStats');
  var winMsg        = document.getElementById('winMsg');
  var winEmoji      = document.getElementById('winEmoji');
  var startOverlay  = document.getElementById('startOverlay');
  var startEmoji    = document.getElementById('startEmoji');
  var startTitle    = document.getElementById('startTitle');
  var startMsg      = document.getElementById('startMsg');
  var startBtn      = document.getElementById('startBtn');
  var winRestartBtn = document.getElementById('winRestartBtn');
  var themeSelect   = document.getElementById('themeSelect');
  var gameWrap      = document.getElementById('gameWrap');

  // ── Apply theme visuals ──────────────────────────────────────────
  function applyTheme(t) {
    var th = themes[t];
    target.textContent = th.icon;
    target.style.boxShadow = '0 0 18px ' + th.glow;
    startEmoji.textContent = th.icon;
    startTitle.textContent = th.title;
    startMsg.innerHTML = th.msg + '<br>Get <strong>20 points</strong> to win! 🏆';
    winEmoji.textContent = '🏆';
    // Restyle bg stars
    addBgDecorations(th.bg);
  }

  // ── Add background decorations ───────────────────────────────────
  function addBgDecorations(icon) {
    // Remove old ones
    var old = gameWrap.querySelectorAll('.bg-star');
    old.forEach(function(el) { el.remove(); });
    // Add new ones
    for (var i = 0; i < 12; i++) {
      var s = document.createElement('div');
      s.className = 'bg-star';
      s.textContent = icon;
      s.style.left = Math.random() * 90 + '%';
      s.style.top  = Math.random() * 90 + '%';
      s.style.animationDelay = (Math.random() * 2) + 's';
      s.style.fontSize = (0.8 + Math.random() * 0.8) + 'em';
      gameWrap.appendChild(s);
    }
  }

  // ── Place target at random position ─────────────────────────────
  function moveTarget() {
    var wrapW = gameWrap.offsetWidth  || 520;
    var wrapH = gameWrap.offsetHeight || 380;
    var size  = 70;
    var margin = 10;
    var x = margin + Math.random() * (wrapW - size - margin * 2);
    var y = margin + Math.random() * (wrapH - size - margin * 2);
    target.style.left = x + 'px';
    target.style.top  = y + 'px';
  }

  // ── Auto-move target every few seconds ──────────────────────────
  function scheduleAutoMove() {
    clearTimeout(moveTimeout);
    if (!gameRunning) return;
    // Speed increases as score goes up
    var delay = Math.max(800, 2200 - score * 60);
    moveTimeout = setTimeout(function() {
      if (gameRunning) {
        wiggleTarget();
        moveTarget();
        scheduleAutoMove();
      }
    }, delay);
  }

  // Short wiggle when auto-moving
  function wiggleTarget() {
    target.style.transition = 'left 0.3s ease, top 0.3s ease';
    setTimeout(function() {
      target.style.transition = 'transform 0.1s';
    }, 350);
  }

  // ── Start / Restart game ─────────────────────────────────────────
  function startGame() {
    score = 0;
    secondsElapsed = 0;
    gameRunning = true;

    scoreDisplay.textContent = 0;
    timerDisplay.textContent = '0s';
    progressBar.style.width = '0%';

    if (winOverlay)   winOverlay.classList.remove('show');
    if (startOverlay) startOverlay.classList.add('hidden');

    target.style.opacity = '1';
    target.style.transform = 'scale(1)';
    target.classList.remove('popping');

    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      secondsElapsed++;
      timerDisplay.textContent = secondsElapsed + 's';
    }, 1000);

    moveTarget();
    scheduleAutoMove();
  }

  // ── Handle target click ──────────────────────────────────────────
  function handleTargetClick(e) {
    if (!gameRunning) return;
    e.stopPropagation();

    // Pop animation
    target.classList.add('popping');

    // Floating +1
    spawnPlusOne(e.clientX, e.clientY);

    score++;
    scoreDisplay.textContent = score;
    progressBar.style.width = (score / GOAL * 100) + '%';

    // Win check
    if (score >= GOAL) {
      gameRunning = false;
      clearInterval(timerInterval);
      clearTimeout(moveTimeout);
      setTimeout(showWin, 300);
      return;
    }

    // Move target after pop finishes
    setTimeout(function() {
      target.classList.remove('popping');
      target.style.opacity = '1';
      target.style.transform = 'scale(1)';
      moveTarget();
      scheduleAutoMove();
    }, 260);
  }

  // ── Floating +1 label ───────────────────────────────────────────
  function spawnPlusOne(cx, cy) {
    var rect = gameWrap.getBoundingClientRect();
    var el = document.createElement('div');
    el.className = 'plus-one';
    el.textContent = '+1';
    el.style.left = (cx - rect.left) + 'px';
    el.style.top  = (cy - rect.top)  + 'px';
    gameWrap.appendChild(el);
    setTimeout(function() { el.remove(); }, 800);
  }

  // ── Show win screen ──────────────────────────────────────────────
  function showWin() {
    var th = themes[currentTheme];
    winMsg.textContent = th.win;
    winStats.textContent = '🕐 Time: ' + secondsElapsed + 's  |  🎯 Clicks: ' + score;
    winOverlay.classList.add('show');
    target.style.opacity = '0';
  }

  // ── Button & input listeners ─────────────────────────────────────
  if (startBtn) startBtn.addEventListener('click', function() {
    currentTheme = themeSelect ? themeSelect.value : 'stars';
    applyTheme(currentTheme);
    startGame();
  });

  if (winRestartBtn) winRestartBtn.addEventListener('click', function() {
    currentTheme = themeSelect ? themeSelect.value : 'stars';
    applyTheme(currentTheme);
    startGame();
  });

  if (themeSelect) themeSelect.addEventListener('change', function() {
    currentTheme = themeSelect.value;
    applyTheme(currentTheme);
    // Restart if game is already running
    if (gameRunning || winOverlay.classList.contains('show')) {
      startGame();
    }
  });

  if (target) target.addEventListener('click', handleTargetClick);

  // ── Initial setup ────────────────────────────────────────────────
  applyTheme('stars');
  moveTarget(); // pre-position target under overlays

  // BUTTON CHECKLIST: #startBtn ✓  #winRestartBtn ✓  #target ✓

});
</script>
</body>
</html>
