<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 Animal Memory Match</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #f9a825 0%, #e53935 50%, #8e24aa 100%);
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: white;
    font-size: 2.2em;
    margin-bottom: 6px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.25);
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-size: 1em;
    margin-bottom: 20px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat-box {
    background: rgba(255,255,255,0.22);
    border-radius: 14px;
    padding: 10px 22px;
    color: white;
    font-weight: bold;
    font-size: 1em;
    text-align: center;
    min-width: 100px;
  }

  .stat-box span {
    display: block;
    font-size: 1.5em;
    font-weight: 900;
  }

  /* Game card wrapper */
  .game-wrap {
    background: white;
    border-radius: 24px;
    padding: 24px;
    max-width: 520px;
    margin: 0 auto 22px auto;
    box-shadow: 0 14px 40px rgba(0,0,0,0.18);
    position: relative;
  }

  /* Card grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 10px;
  }

  /* Each card */
  .card {
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s ease;
    user-select: none;
  }

  .card.flipped { transform: rotateY(180deg); }
  .card.matched { cursor: default; }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2em;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* Card back */
  .card-back {
    background: linear-gradient(135deg, #8e24aa, #e53935);
    border: 3px solid rgba(255,255,255,0.3);
    transform: rotateY(0deg);
    font-size: 1.5em;
  }

  /* Card front */
  .card-front {
    background: #fff9e6;
    border: 3px solid #f9a825;
    transform: rotateY(180deg);
  }

  .card.matched .card-front {
    background: #e8fdf0;
    border-color: #2ecc71;
    animation: matchPop 0.4s ease;
  }

  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.18); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* Win message overlay */
  .win-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.93);
    border-radius: 24px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 30px;
  }

  .win-overlay.show { display: flex; }

  .win-emoji { font-size: 3.5em; margin-bottom: 10px; }

  .win-title {
    font-size: 1.9em;
    font-weight: 900;
    color: #e53935;
    margin-bottom: 8px;
  }

  .win-msg {
    font-size: 1.05em;
    color: #555;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .win-stats {
    font-size: 1em;
    font-weight: bold;
    color: #8e24aa;
    margin-bottom: 24px;
  }

  /* Buttons */
  .btn-restart {
    padding: 13px 34px;
    background: linear-gradient(135deg, #f9a825, #e53935);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 1.05em;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }

  .btn-restart:hover { opacity: 0.88; transform: translateY(-2px); }

  .restart-wrap {
    text-align: center;
    max-width: 520px;
    margin: 0 auto 30px auto;
  }

  #restartBtn {
    padding: 12px 32px;
    background: rgba(255,255,255,0.22);
    color: white;
    border: 2px solid rgba(255,255,255,0.65);
    border-radius: 30px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  #restartBtn:hover { background: rgba(255,255,255,0.38); transform: translateY(-2px); }

  /* Theme selector */
  .theme-wrap {
    text-align: center;
    margin-bottom: 18px;
  }

  .theme-wrap label {
    color: white;
    font-weight: bold;
    margin-right: 8px;
    font-size: 0.95em;
  }

  #themeSelect {
    padding: 8px 14px;
    border-radius: 12px;
    border: none;
    font-size: 0.95em;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    background: white;
    font-weight: bold;
    color: #333;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.3s ease; }

  @media (max-width: 400px) {
    .card-grid { gap: 8px; }
    .card-face { font-size: 1.6em; }
    h1 { font-size: 1.6em; }
  }
</style>
</head>
<body>

<h1>🐾 Memory Match!</h1>
<p class="subtitle">Flip cards to find all matching pairs!</p>

<!-- Theme picker -->
<div class="theme-wrap">
  <label for="themeSelect">🎨 Theme:</label>
  <select id="themeSelect">
    <option value="animals">🐾 Animals</option>
    <option value="planets">🪐 Planets</option>
    <option value="snacks">🍕 Snacks</option>
    <option value="emojis">😂 Emojis</option>
  </select>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-box">Moves<span id="moveCount">0</span></div>
  <div class="stat-box">Pairs Found<span id="pairsCount">0 / 8</span></div>
  <div class="stat-box">⏱ Time<span id="timerDisplay">0s</span></div>
</div>

<!-- Game board -->
<div class="game-wrap" id="gameWrap">
  <div class="card-grid" id="cardGrid"></div>

  <!-- Win overlay inside game-wrap -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-emoji">🏆</div>
    <div class="win-title">You Did It!</div>
    <div class="win-msg">You matched all the pairs!<br>Incredible memory! 🎉</div>
    <div class="win-stats" id="winStats"></div>
    <button class="btn-restart" id="winRestartBtn">🔄 Play Again</button>
  </div>
</div>

<!-- Restart button -->
<div class="restart-wrap">
  <button id="restartBtn">🔄 Restart Game</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ── Themes ──────────────────────────────────────────────────────
  var themes = {
    animals:  ['🐶','🐱','🐸','🐼','🦊','🐧','🦁','🐨'],
    planets:  ['🌍','🪐','☀️','🌙','⭐','🚀','☄️','🌌'],
    snacks:   ['🍕','🍔','🍩','🍦','🌮','🍣','🍪','🍓'],
    emojis:   ['😂','🥳','😎','🤩','😜','🥰','😱','🤖']
  };

  // ── Game state ───────────────────────────────────────────────────
  var cards = [];           // array of card objects
  var flipped = [];         // up to 2 cards currently flipped
  var matched = 0;
  var moves = 0;
  var totalPairs = 8;
  var locked = false;       // prevent clicking while checking
  var timerInterval = null;
  var secondsElapsed = 0;

  // ── DOM elements ─────────────────────────────────────────────────
  var cardGrid      = document.getElementById('cardGrid');
  var moveCount     = document.getElementById('moveCount');
  var pairsCount    = document.getElementById('pairsCount');
  var timerDisplay  = document.getElementById('timerDisplay');
  var winOverlay    = document.getElementById('winOverlay');
  var winStats      = document.getElementById('winStats');
  var restartBtn    = document.getElementById('restartBtn');
  var winRestartBtn = document.getElementById('winRestartBtn');
  var themeSelect   = document.getElementById('themeSelect');

  // ── Shuffle array (Fisher-Yates) ─────────────────────────────────
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // ── Build card data ──────────────────────────────────────────────
  function buildDeck() {
    var theme = themeSelect ? themeSelect.value : 'animals';
    var icons = themes[theme] || themes.animals;
    totalPairs = icons.length; // 8 pairs = 16 cards
    // Duplicate for pairs, then shuffle
    var pairs = icons.concat(icons);
    pairs = shuffle(pairs);
    return pairs.map(function(icon, idx) {
      return { id: idx, icon: icon, isFlipped: false, isMatched: false };
    });
  }

  // ── Start / Restart game ─────────────────────────────────────────
  function startGame() {
    // Reset state
    flipped = [];
    matched = 0;
    moves = 0;
    locked = false;
    secondsElapsed = 0;

    // Reset UI
    moveCount.textContent = 0;
    pairsCount.textContent = '0 / ' + totalPairs;
    timerDisplay.textContent = '0s';
    if (winOverlay) winOverlay.classList.remove('show');

    // Stop old timer, start fresh
    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      secondsElapsed++;
      timerDisplay.textContent = secondsElapsed + 's';
    }, 1000);

    // Build and render deck
    cards = buildDeck();
    renderGrid();
  }

  // ── Render the card grid ─────────────────────────────────────────
  function renderGrid() {
    cardGrid.innerHTML = '';
    cards.forEach(function(cardData) {
      var card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-id', cardData.id);

      card.innerHTML =
        '<div class="card-face card-back">🌟</div>' +
        '<div class="card-face card-front">' + cardData.icon + '</div>';

      card.addEventListener('click', function() {
        handleCardClick(cardData.id, card);
      });

      cardGrid.appendChild(card);
    });
  }

  // ── Handle a card click ──────────────────────────────────────────
  function handleCardClick(id, cardEl) {
    var cardData = cards[id];

    // Ignore if locked, already matched, or already flipped
    if (locked) return;
    if (cardData.isMatched) return;
    if (cardData.isFlipped) return;
    if (flipped.length >= 2) return;

    // Flip it
    cardData.isFlipped = true;
    cardEl.classList.add('flipped');
    flipped.push({ data: cardData, el: cardEl });

    // Check pair when 2 cards are flipped
    if (flipped.length === 2) {
      moves++;
      moveCount.textContent = moves;
      checkPair();
    }
  }

  // ── Check if the two flipped cards match ─────────────────────────
  function checkPair() {
    var a = flipped[0];
    var b = flipped[1];

    if (a.data.icon === b.data.icon) {
      // Match!
      a.data.isMatched = true;
      b.data.isMatched = true;
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matched++;
      pairsCount.textContent = matched + ' / ' + totalPairs;
      flipped = [];

      // Check win
      if (matched === totalPairs) {
        clearInterval(timerInterval);
        setTimeout(showWin, 500);
      }
    } else {
      // No match — lock and flip back after delay
      locked = true;
      setTimeout(function() {
        a.data.isFlipped = false;
        b.data.isFlipped = false;
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flipped = [];
        locked = false;
      }, 900);
    }
  }

  // ── Show win screen ──────────────────────────────────────────────
  function showWin() {
    winStats.textContent =
      '🕐 Time: ' + secondsElapsed + 's  |  🎯 Moves: ' + moves;
    winOverlay.classList.add('show');
  }

  // ── Button listeners ─────────────────────────────────────────────
  if (restartBtn) restartBtn.addEventListener('click', function() {
    startGame();
  });

  if (winRestartBtn) winRestartBtn.addEventListener('click', function() {
    startGame();
  });

  if (themeSelect) themeSelect.addEventListener('change', function() {
    startGame();
  });

  // ── Kick off the game ────────────────────────────────────────────
  startGame();

  // BUTTON CHECKLIST: #restartBtn ✓  #winRestartBtn ✓  .card (dynamic) ✓

});
</script>
</body>
</html>
