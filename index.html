<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✅ My Habit Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: white;
    font-size: 2.2em;
    margin-bottom: 6px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.88);
    font-size: 1em;
    margin-bottom: 26px;
  }

  /* Date strip */
  .date-strip {
    text-align: center;
    color: white;
    font-size: 1em;
    font-weight: bold;
    margin-bottom: 20px;
    opacity: 0.9;
    letter-spacing: 0.5px;
  }

  /* Main card */
  .main-card {
    background: white;
    border-radius: 22px;
    padding: 28px 28px 22px;
    max-width: 500px;
    margin: 0 auto 26px auto;
    box-shadow: 0 12px 36px rgba(0,0,0,0.15);
  }

  .main-card h2 {
    font-size: 1.15em;
    color: #185a9d;
    margin-bottom: 20px;
  }

  /* Each habit row */
  .habit-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 12px;
    background: #f5f9ff;
    border: 2px solid #e0ecff;
    transition: background 0.25s, border-color 0.25s, transform 0.15s;
    cursor: pointer;
    user-select: none;
  }

  .habit-row:hover { transform: translateY(-2px); background: #eaf3ff; }

  .habit-row.done {
    background: #e8fdf0;
    border-color: #5edc8a;
  }

  /* Circle check button */
  .check-circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 3px solid #b0c8f0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3em;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }

  .habit-row.done .check-circle {
    background: #2ecc71;
    border-color: #2ecc71;
    transform: scale(1.15);
  }

  .habit-emoji { font-size: 1.7em; flex-shrink: 0; }

  .habit-label {
    flex: 1;
    font-size: 1.05em;
    font-weight: bold;
    color: #333;
    transition: color 0.2s;
  }

  .habit-row.done .habit-label {
    color: #1a8a4a;
    text-decoration: line-through;
    text-decoration-color: #5edc8a;
  }

  .habit-streak {
    font-size: 0.82em;
    color: #888;
    background: #f0f0f0;
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .habit-row.done .habit-streak {
    background: #d4f5e2;
    color: #1a8a4a;
  }

  /* Progress bar section */
  .progress-section {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 2px dashed #e0ecff;
  }

  .progress-label {
    font-size: 0.95em;
    color: #555;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .progress-bar-bg {
    width: 100%;
    height: 18px;
    background: #e8e8e8;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, #43cea2, #185a9d);
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-msg {
    text-align: center;
    font-size: 1.1em;
    font-weight: bold;
    color: #185a9d;
    min-height: 1.5em;
    transition: opacity 0.3s;
  }

  /* Add custom habit area */
  .add-card {
    background: white;
    border-radius: 22px;
    padding: 22px 28px;
    max-width: 500px;
    margin: 0 auto 26px auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  .add-card h2 {
    font-size: 1.1em;
    color: #185a9d;
    margin-bottom: 16px;
  }

  .add-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .add-row input[type="text"] {
    flex: 1;
    min-width: 140px;
    padding: 11px 14px;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 1em;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .add-row input[type="text"]:focus { border-color: #43cea2; }

  .emoji-select {
    padding: 11px 8px;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 1em;
    outline: none;
    cursor: pointer;
    background: white;
    transition: border-color 0.2s;
  }

  .emoji-select:focus { border-color: #43cea2; }

  #addHabitBtn {
    padding: 11px 20px;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  #addHabitBtn:hover { opacity: 0.88; transform: translateY(-2px); }

  /* Reset button */
  .reset-wrap {
    text-align: center;
    max-width: 500px;
    margin: 0 auto 30px auto;
  }

  #resetBtn {
    padding: 11px 30px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 30px;
    font-size: 0.95em;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  #resetBtn:hover { background: rgba(255,255,255,0.35); transform: translateY(-2px); }

  /* Celebration pop */
  .celebrate {
    animation: pop 0.35s ease;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .shake { animation: shake 0.3s ease; }

  @media (max-width: 480px) {
    h1 { font-size: 1.7em; }
    .main-card, .add-card { padding: 18px 14px; }
  }
</style>
</head>
<body>

<h1>✅ My Habit Tracker</h1>
<p class="subtitle">Build great habits — one checkmark at a time!</p>

<div class="date-strip" id="dateStrip">📅 Today: —</div>

<!-- Habit checklist card -->
<div class="main-card" id="mainCard">
  <h2>🌟 Today's Goals</h2>
  <div id="habitList"></div>

  <!-- Progress bar -->
  <div class="progress-section">
    <div class="progress-label">Progress: <span id="progressCount">0</span> / <span id="progressTotal">0</span> done</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-msg" id="progressMsg">🌱 Let's get started!</div>
  </div>
</div>

<!-- Add a custom habit -->
<div class="add-card">
  <h2>➕ Add Your Own Habit</h2>
  <div class="add-row">
    <select class="emoji-select" id="emojiSelect">
      <option value="⭐">⭐</option>
      <option value="💧">💧</option>
      <option value="🏃">🏃</option>
      <option value="📚">📚</option>
      <option value="🎨">🎨</option>
      <option value="🎵">🎵</option>
      <option value="🥦">🥦</option>
      <option value="😴">😴</option>
      <option value="🧹">🧹</option>
      <option value="🙏">🙏</option>
    </select>
    <input type="text" id="newHabitInput" placeholder="e.g. Practice guitar" maxlength="40">
    <button id="addHabitBtn">Add</button>
  </div>
</div>

<!-- Reset day button -->
<div class="reset-wrap">
  <button id="resetBtn">🔄 Reset Today's Progress</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ── Default habits (5 to start) ─────────────────────────────────
  var habits = [
    { id: 1, emoji: '💧', label: 'Drink 8 glasses of water', done: false, streak: 0 },
    { id: 2, emoji: '📚', label: 'Read for 20 minutes',       done: false, streak: 0 },
    { id: 3, emoji: '🏃', label: 'Exercise or go for a walk', done: false, streak: 0 },
    { id: 4, emoji: '🧹', label: 'Tidy up my space',          done: false, streak: 0 },
    { id: 5, emoji: '😴', label: 'Be in bed by 9:30 pm',      done: false, streak: 0 }
  ];

  var nextId = 10; // id counter for new habits

  // ── Grab elements ────────────────────────────────────────────────
  var habitList     = document.getElementById('habitList');
  var progressFill  = document.getElementById('progressFill');
  var progressMsg   = document.getElementById('progressMsg');
  var progressCount = document.getElementById('progressCount');
  var progressTotal = document.getElementById('progressTotal');
  var dateStrip     = document.getElementById('dateStrip');
  var newHabitInput = document.getElementById('newHabitInput');
  var emojiSelect   = document.getElementById('emojiSelect');
  var addHabitBtn   = document.getElementById('addHabitBtn');
  var resetBtn      = document.getElementById('resetBtn');
  var mainCard      = document.getElementById('mainCard');

  // ── Show today's date ────────────────────────────────────────────
  var today = new Date();
  var dateStr = today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  if (dateStrip) dateStrip.textContent = '📅 ' + dateStr;

  // ── Progress messages based on % done ───────────────────────────
  function getProgressMsg(done, total) {
    if (total === 0) return '🌱 Add some habits above!';
    var pct = done / total;
    if (done === 0)        return '🌱 Let\'s get started — you\'ve got this!';
    if (pct <= 0.25)       return '🚀 Great start! Keep going!';
    if (pct <= 0.5)        return '💪 Halfway there — awesome work!';
    if (pct <= 0.75)       return '🔥 So close! Just a little more!';
    if (pct < 1)           return '⚡ Almost done — finish strong!';
    return '🎉 AMAZING! You completed ALL your habits today! 🏆';
  }

  // ── Update progress bar & message ───────────────────────────────
  function updateProgress() {
    var total = habits.length;
    var done  = habits.filter(function(h) { return h.done; }).length;
    var pct   = total > 0 ? (done / total) * 100 : 0;

    progressCount.textContent = done;
    progressTotal.textContent = total;
    progressFill.style.width  = pct + '%';
    progressMsg.textContent   = getProgressMsg(done, total);

    // Celebrate the card when all done
    if (done === total && total > 0) {
      mainCard.classList.add('celebrate');
      setTimeout(function() { mainCard.classList.remove('celebrate'); }, 400);
    }
  }

  // ── Build the habit list from the habits array ───────────────────
  function renderAll() {
    habitList.innerHTML = '';
    habits.forEach(function(habit) {
      renderHabitRow(habit);
    });
    updateProgress();
  }

  // ── Render one habit row ─────────────────────────────────────────
  function renderHabitRow(habit) {
    var row = document.createElement('div');
    row.className = 'habit-row' + (habit.done ? ' done' : '');
    row.setAttribute('data-id', habit.id);

    row.innerHTML =
      '<div class="check-circle">' + (habit.done ? '✓' : '') + '</div>' +
      '<div class="habit-emoji">' + habit.emoji + '</div>' +
      '<div class="habit-label">' + escapeHTML(habit.label) + '</div>' +
      '<div class="habit-streak">🔥 ' + habit.streak + ' day' + (habit.streak === 1 ? '' : 's') + '</div>';

    // Click toggles done state
    row.addEventListener('click', function() {
      toggleHabit(habit.id, row);
    });

    habitList.appendChild(row);
  }

  // ── Toggle a habit done/undone ───────────────────────────────────
  function toggleHabit(id, row) {
    var habit = habits.find(function(h) { return h.id === id; });
    if (!habit) return;

    habit.done = !habit.done;

    // Update streak count when marking done
    if (habit.done) {
      habit.streak += 1;
    }

    // Update the row visually
    if (habit.done) {
      row.classList.add('done');
      row.querySelector('.check-circle').textContent = '✓';
    } else {
      row.classList.remove('done');
      row.querySelector('.check-circle').textContent = '';
      // Undo streak increase if unchecked
      if (habit.streak > 0) habit.streak -= 1;
    }

    // Update streak display
    row.querySelector('.habit-streak').textContent =
      '🔥 ' + habit.streak + ' day' + (habit.streak === 1 ? '' : 's');

    updateProgress();
  }

  // ── Add a new custom habit ───────────────────────────────────────
  if (addHabitBtn) addHabitBtn.addEventListener('click', function() {
    var label = newHabitInput ? newHabitInput.value.trim() : '';
    var emoji = emojiSelect ? emojiSelect.value : '⭐';

    if (!label) {
      if (newHabitInput) {
        newHabitInput.classList.add('shake');
        newHabitInput.focus();
        setTimeout(function() { newHabitInput.classList.remove('shake'); }, 400);
      }
      return;
    }

    var newHabit = {
      id:     nextId++,
      emoji:  emoji,
      label:  label,
      done:   false,
      streak: 0
    };

    habits.push(newHabit);
    renderHabitRow(newHabit);
    updateProgress();

    // Clear input
    newHabitInput.value = '';
    newHabitInput.focus();
  });

  // ── Reset all habits for a new day ──────────────────────────────
  if (resetBtn) resetBtn.addEventListener('click', function() {
    habits.forEach(function(h) { h.done = false; });
    renderAll();
  });

  // ── Allow Enter key to add habit ────────────────────────────────
  if (newHabitInput) {
    newHabitInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (addHabitBtn) addHabitBtn.click();
      }
    });
  }

  // ── Simple HTML escape ───────────────────────────────────────────
  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Initial render ───────────────────────────────────────────────
  renderAll();

  // BUTTON CHECKLIST: #addHabitBtn ✓  #resetBtn ✓  .habit-row (dynamic) ✓

});
</script>
</body>
</html>
